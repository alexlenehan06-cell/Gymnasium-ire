<section class="section">
    <h1>Locations</h1>
    <button onclick="getWeather()">Check Weather</button>
    <p id="weather"></p>
</section>

<script>
function getWeather() {
    fetch("https://api.openweathermap.org/data/2.5/weather?q=Dublin&appid=YOUR_API_KEY&units=metric")
    .then(res => res.json())
    .then(data => {
        document.getElementById("weather").innerText =
            "Temp: " + data.main.temp + "°C";
    });
}
</script>
